# Pin revs before use; run `pre-commit autoupdate` periodically.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        name: black (backend)
        files: ^back/.*\.py$

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        name: ruff (lint & fix)
        files: ^back/.*\.py$
        args: [--fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: bandit (security scan)
        files: ^back/.*\.py$
        exclude: ^back/tests/    # skip tests (avoids B101 in tests)

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: prettier (frontend)
        files: ^front/.*\.(js|jsx|ts|tsx|css|json|md|html)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.4.0
    hooks:
      - id: eslint
        name: eslint (frontend)
        files: ^front/.*\.(js|jsx|ts|tsx)$

  - repo: local
    hooks:
      - id: backend-tests
        name: backend tests (pytest)
        entry: bash -c 'cd back && source venv/bin/activate && python -m pytest tests/'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-tests
        name: frontend tests (vitest)
        entry: bash -c 'cd front && npm test'
        language: system
        pass_filenames: false
        stages: [pre-push]
